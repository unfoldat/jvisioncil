backend:
  name: github
  repo: unfoldat/jvisioncil
  branch: main
  # sveltia-cms-auth Cloudflare Worker (PAT 대신 OAuth).
  base_url: https://jvisioncil-cms-auth.dkdlvkt244.workers.dev

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: notices
    label: 소식
    description: 홈의 최근 소식과 소식 게시판(목록·상세·기관별 태그 페이지)에 표시됩니다.
    folder: src/content/notices
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    # 편집자 규칙: 남의 소식이면 주소를 붙이고, 우리 일이면 내용을 쓰세요.
    fields:
      - { name: title, label: 제목, widget: string }
      - { name: date, label: 날짜, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false }
      - name: publisher
        label: 발행 주체
        widget: select
        options:
          - { label: 좋은비전 (자체 소식), value: 좋은비전 }
          - { label: 협력기관, value: 협력기관 }
        default: 좋은비전
        hint: '"협력기관"을 선택하면 바로 아래 "기관"에서 실제 기관을 고르세요.'
      - name: org
        label: 기관 (발행 주체가 "협력기관"일 때만)
        widget: relation
        collection: network-orgs
        search_fields: [name]
        display_fields: [name]
        value_field: '{{slug}}'
        multiple: false
        required: false
        hint: 'Sveltia CMS는 다른 필드 값에 따라 필드를 자동으로 숨기는 기능이 아직 없어 이 필드가 항상 보입니다. 발행 주체가 "협력기관"일 때만 선택하고, "좋은비전"이면 비워두세요. 목록에 없는 기관이면 "함께하는 기관" 컬렉션에 먼저 등록하세요.'
      - { name: pinned, label: '상단 고정 ([공지])', widget: boolean, default: false }
      - name: url
        label: 원문 주소 (남의 소식일 때만)
        widget: string
        required: false
        hint: '이 소식이 있는 정확한 글 주소를 붙여넣으세요 (기관 메인 홈페이지 아님).'
      - name: body
        label: 내용 (우리 일일 때만)
        widget: markdown
        required: false
        hint: '이미지를 넣으면 대체 텍스트(alt)를 반드시 채우세요. 비어 있으면 빌드가 실패합니다.'

  - name: network-orgs
    label: 함께하는 기관
    description: 홈 하단과 센터소개 페이지의 함께하는 기관 배너, 그리고 소식 작성 시(발행 주체가 "협력기관"일 때) "기관" 선택 목록에 표시됩니다. 좋은비전 자체는 여기 등록하지 않습니다 — 소식의 "발행 주체"에서 따로 선택하세요.
    folder: src/content/network-orgs
    create: true
    fields:
      - name: name
        label: 기관명
        widget: string
        hint: '소식 작성 시 "기관" 선택 목록에 이 이름으로 나타납니다.'
      - { name: url, label: 기관 홈페이지, widget: string, required: false }

  - name: sponsors
    label: 후원기관
    description: 후원 안내 페이지의 후원기관 영역에 표시됩니다.
    folder: src/content/sponsors
    create: true
    fields:
      - { name: name, label: 기관명, widget: string }
      - { name: url, label: 기관 홈페이지, widget: string }

  - name: donation-reports
    label: 기부금 사용내역
    description: 후원 안내 페이지의 기부금 사용내역 목록(파일명 + PDF 다운로드)에 표시됩니다.
    label_singular: 기부금 사용내역 작성
    folder: src/content/donation-reports
    create: true
    identifier_field: title
    summary: '{{year}}년 · {{title}}'
    slug: '{{year}}-{{slug}}'
    fields:
      - { name: title, label: 제목, widget: string }
      - { name: year, label: 연도, widget: number, value_type: int }
      - { name: date, label: 게시일, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, required: false }
      - { name: pinned, label: 상단 고정, widget: boolean, default: false }
      - { name: file, label: PDF 파일, widget: file, accept: 'application/pdf,.pdf' }

  - name: impact
    label: 함께 만드는 변화
    description: 후원 안내 페이지의 활동 카드와, 전체 활동 목록·상세 페이지(/함께-만드는-변화/)에 표시됩니다.
    label_singular: 활동 글
    folder: src/content/impact
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    # 편집자 규칙: 좋은비전이 직접 수행한 활동, 후원으로 만들어진 변화만 여기 씁니다.
    # 공지·행사안내·외부기관 소식은 '소식' 컬렉션에 쓰세요.
    fields:
      - { name: title, label: 제목, widget: string }
      - { name: date, label: 게시일, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false }
      - { name: image, label: 대표 사진, widget: image }
      - name: image_alt
        label: 대표 사진 대체텍스트
        widget: string
        hint: '사진이 전달하는 내용을 문장으로 설명하세요. 스크린리더 이용자에게는 이 글자가 사진입니다.'
      - { name: summary, label: 짧은 소개, widget: text }
      - name: body
        label: 본문
        widget: markdown
        hint: '이미지를 넣으면 대체 텍스트(alt)를 반드시 채우세요. 비어 있으면 빌드가 실패합니다.'
      - name: category
        label: 활동 유형
        widget: select
        options: ['상담', '강연', '행사', '협력 활동', '후원 이야기', '기타']
      - name: link
        label: 관련 링크
        widget: string
        required: false
        hint: '관련 기사·페이지 주소가 있으면 붙여주세요 (선택).'
      - name: status
        label: 공개 여부
        widget: select
        options:
          - { label: '임시저장 (draft)', value: draft }
          - { label: '공개 (published)', value: published }
        default: draft

  - name: first-guides
    label: 처음 오신 분께
    description: 홈의 "처음 오신 분께" 영역과, 처음 오신 분께 안내 목록·상세 페이지(/처음-오신-분께/)에 표시됩니다.
    label_singular: 처음 오신 분 안내 작성
    folder: src/content/first-guides
    create: true
    identifier_field: title
    summary: '{{title}}'
    fields:
      - { name: title, label: 제목, widget: string }
      - { name: date, label: 게시일, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, required: false }
      - { name: pinned, label: 상단 고정, widget: boolean, default: false }
      - { name: body, label: 본문, widget: markdown }
